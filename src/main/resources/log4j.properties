log4j.rootLogger=DEBUG, console, file

log4j.appender.console=org.apache.log4j.ConsoleAppender
log4j.appender.console.Target=System.out
log4j.appender.console.ImmediateFlush=true
log4j.appender.console.layout=org.apache.log4j.PatternLayout
log4j.appender.console.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss} [%t] %-5p %c{1} - %m%n

log4j.appender.file=org.apache.log4j.RollingFileAppender
log4j.appender.file.File=logs/app.log
log4j.appender.file.Append=true
log4j.appender.file.MaxFileSize=20MB
log4j.appender.file.MaxBackupIndex=10
log4j.appender.file.layout=org.apache.log4j.PatternLayout
log4j.appender.file.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss} [%t] %-5p %c - %m%n

log4j.logger.java.sql=INFO
log4j.logger.java.sql.Connection=DEBUG
log4j.logger.java.sql.Statement=INFO
log4j.logger.java.sql.PreparedStatement=INFO
log4j.logger.java.sql.ResultSet=DEBUG

log4j.logger.org.mybatis=DEBUG
log4j.logger.org.apache.ibatis=DEBUG

log4j.logger.org.springframework.jdbc=DEBUG

log4j.logger.org.springframework.jdbc.datasource=DEBUG
log4j.logger.org.springframework.jdbc.support=DEBUG

log4j.logger.oracle.jdbc=DEBUG
log4j.logger.oracle.jdbc.driver=DEBUG
log4j.logger.oracle.jdbc.pool=DEBUG

log4j.logger.java.net=INFO

log4j.logger.org.apache.commons.dbcp=DEBUG
log4j.logger.com.zaxxer.hikari=DEBUG
log4j.logger.org.apache.commons.dbcp2=DEBUG
log4j.logger.org.apache.commons.pool2=DEBUG

log4j.logger.jdbc.sqlonly=DEBUG
log4j.logger.jdbc.sqltiming=DEBUG
log4j.logger.jdbc.audit=DEBUG
log4j.logger.jdbc.resultset=OFF
log4j.logger.jdbc.connection=DEBUG
log4j.logger.java.sql.DriverManager=DEBUG

log4j.logger.org.jboss.logging=DEBUG

log4j.logger.org.springframework=INFO
log4j.logger.org.apache=INFO

log4jdbc.dump.sql.maxlinelength=0
log4jdbc.dump.fulldebugstacktrace=true
log4jdbc.auto.load.popular.drivers=true